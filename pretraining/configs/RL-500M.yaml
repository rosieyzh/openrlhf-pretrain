run_name: OLMo-500M-as_fm3_8xtg
seed: 6198
dry_run: false

wandb:
  name: ${run_name}
  project: olmo-debug
  entity: <YOUR WANDB ENTITY>

model:
  d_model: 1536
  n_heads: 12
  n_layers: 12
  mlp_ratio: 8
  weight_tying: false
  alibi: false
  rope: true
  flash_attention: true
  attention_dropout: 0.0
  attention_layer_norm: false
  clip_qkv: null
  include_bias: false
  block_type: sequential
  layer_norm_type: default
  layer_norm_with_affine: false
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  vocab_size: 32000
  embedding_size: 32000
  eos_token_id: 0
  pad_token_id: 1
  init_device: cuda
  init_fn: normal
  init_std: 0.02
  init_cutoff_factor: 3

ddp:
  grad_sync_mode: batch
  find_unused_params: false

compile: null

optimizer:
  name: adamw
  learning_rate: 0.001
  weight_decay: 0.1
  eps: 1e-8
  decay_norm_and_bias: true
  decay_embeddings: true
  metrics_log_interval: 10

scheduler:
  name: cosine_with_warmup
  t_warmup: 5000
  alpha_f: 0.1
  warmup_min_lr: 0

tokenizer:
  identifier: meta-llama/Llama-2-7b-hf
  truncate_direction: right

save_folder: <PATH_TO_CHECKPOINT>/${run_name}
save_overwrite: false

# Unsharded checkpoints (for ddp)
save_interval_unsharded: 20000
save_num_unsharded_checkpoints_to_keep: 1
save_interval: 2000
save_num_checkpoints_to_keep: 1

load_path: null

max_duration: 1ep
stop_at: 406_934
global_train_batch_size: 512
device_train_microbatch_size: 16

precision: amp_bf16
distributed_strategy: ddp

gen1_gc_interval: 1

max_grad_norm: 1.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 20

eval_interval: 5000
eval_subset_num_batches: -1
device_eval_batch_size: ${device_train_microbatch_size}

data:
  pad_direction: right
  num_workers: 32
  drop_last: true
  pin_memory: true
  prefetch_factor: 8
  persistent_workers: true
  timeout: 0
  paths: ${path.glob:<PATH_TO_DATA>/as_fm3_8xtg/*/*.ds}